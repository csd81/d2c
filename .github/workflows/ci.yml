name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -U pip
      - run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy, full src/d2c)
        run: mypy
      - name: Security lint (bandit)
        run: bandit -c pyproject.toml -r src/d2c
      - name: Dependency audit (pip-audit, advisory)
        # Non-blocking: upstream CVEs shouldn't fail the build; review the report.
        continue-on-error: true
        run: pip-audit
      - name: Tests
        run: pytest -q
      - name: Build package
        run: python -m build
